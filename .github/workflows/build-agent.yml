name: Build Agent Binaries

on:
  push:
    tags: ['v*']           # Trigger on version tags: git tag v1.1.0 && git push --tags
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Phase 1 — Windows (primary target; stabilise here first)
  # Phase 2 — macOS
  # Phase 3 — Linux
  # ────────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false     # Don't cancel other OS builds on single failure
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: SecuraCam-Windows.exe
            dist_path: agent/dist/SecuraCam.exe

          - os: macos-latest
            label: macOS
            artifact_name: SecuraCam-macOS.zip
            dist_path: agent/dist/SecuraCam-macOS.zip


    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install Python dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Pre-download YOLO model so it is bundled into the binary
      - name: Download YOLO model
        working-directory: agent
        run: python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')"

      # ── Windows ─────────────────────────────────────────────────────────────
      - name: Build (Windows) — single-file portable .exe
        if: runner.os == 'Windows'
        working-directory: agent
        run: pyinstaller build/SecuraCam.spec --clean --distpath dist/

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: Build (macOS) — .app bundle
        if: runner.os == 'macOS'
        working-directory: agent
        run: pyinstaller build/SecuraCam.spec --clean --distpath dist/

      - name: Zip .app bundle (macOS)
        if: runner.os == 'macOS'
        working-directory: agent/dist
        run: zip -r SecuraCam-macOS.zip SecuraCam.app


      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.dist_path }}
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on version tags)
  # ────────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/SecuraCam-Windows.exe/SecuraCam-Windows.exe
            dist/SecuraCam-macOS.zip/SecuraCam-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
